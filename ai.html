<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="ai.title">SmartContent – أدوات الذكاء الاصطناعي</title>
  <link rel="stylesheet" href="assets/style.css?v=2.1.1">
</head>
<body>
  <div class="container">
    <p><a href="./index.html" style="font-weight: 600;">← العودة للرئيسية</a></p>
    
    <h2>🤖 أدوات الذكاء الاصطناعي</h2>
    <p class="muted">توليد منشورات، سكريبتات، وملخصات باستخدام Gemini</p>

    <div class="card">
      <div class="card-head">الموضوع / الطلب</div>
      
      <textarea id="ai-topic" rows="6" 
                placeholder="اكتب الموضوع الذي تريد توليد محتوى عنه (مثال: نصيحة عن الاستثمار في Pi Network)"></textarea>
      
      <div style="height:15px"></div>
      
      <button id="generateBtn" class="primary" style="width: 100%; padding: 14px; font-size: 1.1rem;">
        توليد المنشور (0.001 Pi)
      </button>
      
      <p style="font-size: 0.8rem; margin-top: 10px; color: #888;">
        * يتطلب دفع بسيط باستخدام Pi Payments
      </p>

      <div id="ai-result" style="display: none; margin-top:20px; padding:15px; background:#1e3a2f; border-radius:8px; color:#fff;">
      </div>
    </div>
  </div>

  <!-- Pi SDK وملفات التطبيق -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/app.js"></script>

  <script>
    // تهيئة Pi SDK
    async function initPiSDK() {
      try {
        await Pi.init({ version: "2.0", sandbox: true });
        console.log("✅ Pi SDK تم تهيئته بنجاح");
      } catch (err) {
        console.error("❌ فشل Pi SDK:", err);
      }
    }

    // دالة توليد مبسطة للاختبار (بدون دفع مؤقتاً)
    async function handleAiGeneration() {
      const topicInput = document.getElementById("ai-topic");
      const resultArea = document.getElementById("ai-result");

      if (!topicInput || !topicInput.value.trim()) {
        alert("يرجى كتابة موضوع أولاً!");
        return;
      }

      console.log("🚀 تم الضغط على زر التوليد - الموضوع:", topicInput.value);

      resultArea.style.display = "block";
      resultArea.innerHTML = `
        <strong>✅ تم الضغط بنجاح!</strong><br><br>
        جاري توليد محتوى عن:<br>
        <em>${topicInput.value}</em><br><br>
        <small>هذا اختبار للتأكد من عمل الزر.<br>
        سنضيف الدفع + Gemini الحقيقي في الخطوة التالية.</small>
      `;

      console.log("✅ تم عرض النتيجة بنجاح");
    }

    // ربط الزر عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
      initPiSDK();

      const btn = document.getElementById('generateBtn');
      if (btn) {
        btn.addEventListener('click', handleAiGeneration);
        console.log("✅ زر التوليد مربوط بنجاح");
      } else {
        console.error("❌ لم يتم العثور على الزر");
      }
    });
  </script>
</body>
</html>
