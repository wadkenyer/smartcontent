<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="editor.title">SmartContent – Editor</title>
  <link rel="stylesheet" href="assets/style.css?v=2.1.0">
  <style>
    /* تحسينات خاصة بصفحة المحرر */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      background: var(--card);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    .editor-area {
      min-height: 400px;
      font-size: 1.1rem;
      line-height: 1.8;
      resize: vertical;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <p><a href="./index.html" style="font-weight: 600;">← <span data-i18n="nav.home">Back</span></a></p>
    
    <h2 data-i18n="editor.title">📝 Editor</h2>
    <p class="muted" data-i18n="editor.lead">Write distraction-free with autosave.</p>

    <div class="toolbar">
      <button class="chip" onclick="format('bold')"><b>B</b></button>
      <button class="chip" onclick="format('italic')"><i>I</i></button>
      <button class="chip" onclick="format('underline')"><u>U</u></button>
      <div style="flex-grow: 1;"></div>
      <button class="primary" onclick="saveDraft()" data-i18n="editor.save">Save Draft</button>
    </div>

    <textarea id="editor-body" class="editor-area" 
              data-i18n-attr="placeholder:editor.ph_body" 
              placeholder="Start writing..."></textarea>

    <div class="status-bar">
      <span id="word-count">0 words</span>
      <span id="save-status"></span>
    </div>
  </div>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/app.js"></script>

  <script>
    const editor = document.getElementById('editor-body');
    const status = document.getElementById('save-status');
    const wordCount = document.getElementById('word-count');
    const DRAFT_KEY = 'sc_editor_draft';

    // 1. تحميل المسودة عند الفتح
    window.onload = () => {
        const saved = localStorage.getItem(DRAFT_KEY);
        if (saved) {
            editor.value = saved;
            updateWordCount();
        }
    };

    // 2. دالة التنسيق (بسيطة للـ Textarea)
    function format(command) {
        // ملاحظة: execCommand تعمل مع contentEditable، هنا نكتفي بالتركيز
        editor.focus();
        console.log("Formatting: " + command);
    }

    // 3. الحفظ اليدوي
    function saveDraft() {
        localStorage.setItem(DRAFT_KEY, editor.value);
        const lang = window.SC_I18N.getLang();
        status.textContent = lang === 'ar' ? '✅ تم الحفظ محلياً' : '✅ Saved locally';
        setTimeout(() => status.textContent = '', 2000);
    }

    // 4. الحفظ التلقائي الذكي وحساب الكلمات
    editor.addEventListener('input', () => {
        updateWordCount();
        
        // حفظ تلقائي كلما توقف المستخدم عن الكتابة لثانية واحدة
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(() => {
            localStorage.setItem(DRAFT_KEY, editor.value);
            status.textContent = '...';
        }, 1000);
    });

    function updateWordCount() {
        const text = editor.value.trim();
        const count = text ? text.split(/\s+/).length : 0;
        const lang = window.SC_I18N.getLang();
        wordCount.textContent = lang === 'ar' ? `${count} كلمة` : `${count} words`;
    }
  </script>
</body>
</html>
