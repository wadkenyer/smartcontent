<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartContent • Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        button { padding: 12px 24px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #connect-btn { background: #4f46e5; color: white; }
        #welcome { font-size: 24px; margin: 20px 0; }
        .locked { display: none; background: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .pi-feature { background: #e0f2fe; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartContent ⚡</h1>
    <p>منصتك الذكية لإنشاء المحتوى على Pi Network</p>

    <!-- رسالة الترحيب -->
    <div id="welcome">مرحباً بك، Creator 🚀</div>

    <!-- زر الاتصال بـ Pi -->
    <button id="connect-btn" onclick="connectWithPi()">
        🔗 Connect with Pi Wallet
    </button>

    <!-- المميزات المقفلة (تظهر بعد الاتصال) -->
    <div id="features" class="locked">
        <h2>المميزات المتاحة بعد الاتصال</h2>
        
        <button class="pi-feature" onclick="makePiPayment(0.5, 'Quick Draft Save')">حفظ Draft (0.5 Pi)</button>
        <button class="pi-feature" onclick="makePiPayment(1, 'AI Content Generation')">توليد محتوى بالذكاء الاصطناعي (1 Pi)</button>
        <button class="pi-feature" onclick="makePiPayment(2, 'Premium Design')">تصميم احترافي (2 Pi)</button>
        
        <button onclick="savePost()">حفظ المنشور (مجاني بعد الاتصال)</button>
    </div>

    <div class="locked pi-feature">
        <h3>AI Tools</h3>
        <textarea id="prompt" placeholder="اكتب وصف المحتوى اللي عايز تولده..."></textarea><br>
        <button onclick="generateAI()">Generate with AI</button>
    </div>
</div>

<script>
// متغيرات عالمية
let currentUser = null;

// تهيئة Pi SDK
async function initPi() {
    try {
        await window.Pi.init({
            version: "2.0",
            sandbox: true        // ← غيّره إلى false بعد قبول التطبيق من Pi
        });
        console.log("✅ Pi SDK تم تهيئته بنجاح");

        // إظهار زر الاتصال
        document.getElementById("connect-btn").style.display = "inline-block";
    } catch (error) {
        console.error("❌ خطأ في Pi SDK:", error);
    }
}

// تسجيل الدخول
async function connectWithPi() {
    try {
        const scopes = ["payments", "username"];

        const auth = await window.Pi.authenticate(scopes, onIncompletePaymentFound);

        currentUser = auth.user;
        console.log("👤 المستخدم:", currentUser);

        // تحديث الواجهة
        document.getElementById("welcome").innerHTML = 
            `مرحباً، ${currentUser.username || currentUser.uid} 👋`;

        // إظهار المميزات
        document.getElementById("features").style.display = "block";
        document.getElementById("connect-btn").style.display = "none";

        alert(`✅ تم الاتصال بنجاح!\nاسم المستخدم: ${currentUser.username || "غير متوفر"}`);

    } catch (error) {
        console.error("❌ خطأ في الاتصال:", error);
        alert("فشل الاتصال. تأكد من فتح الموقع داخل Pi Browser.");
    }
}

// معالجة الدفعات غير المكتملة
function onIncompletePaymentFound(payment) {
    console.log("⚠️ دفعة غير مكتملة:", payment);
    return window.Pi.createPayment(payment);
}

// دالة الدفع
async function makePiPayment(amount = 1, memo = "SmartContent Feature") {
    if (!currentUser) {
        alert("يرجى الاتصال بمحفظة Pi أولاً");
        return;
    }

    try {
        const paymentData = {
            amount: amount,
            memo: memo,
            metadata: {
                app: "SmartContent",
                feature: memo,
                user: currentUser.uid
            }
        };

        const payment = await window.Pi.createPayment(paymentData);
        console.log("✅ تم الدفع بنجاح:", payment);
        alert(`✅ تم الدفع ${amount} Pi بنجاح!\nالمذكرة: ${memo}`);
        
        // هنا يمكنك استدعاء الميزة بعد الدفع
        if (memo.includes("AI")) generateAI();

    } catch (error) {
        console.error("❌ خطأ في الدفع:", error);
        alert("فشل عملية الدفع. حاول مرة أخرى.");
    }
}

// مثال: حفظ منشور
function savePost() {
    if (!currentUser) {
        alert("يرجى الاتصال بـ Pi أولاً");
        return;
    }
    alert("✅ تم حفظ المنشور بنجاح على Pi Network!");
}

// مثال: توليد AI (بعد الدفع)
async function generateAI() {
    const prompt = document.getElementById("prompt").value;
    if (!prompt) {
        alert("اكتب وصف المحتوى أولاً");
        return;
    }
    alert(`جاري توليد المحتوى باستخدام Gemini...\nالوصف: ${prompt}`);
    // هنا يمكنك إضافة fetch إلى /api/generate-ai لاحقاً
}

// تشغيل التهيئة عند تحميل الصفحة
window.onload = initPi;
</script>

</body>
</html>
