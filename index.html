<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartContent • Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; padding:20px; background:#f8fafc; }
        .container { max-width:1000px; margin:auto; background:white; padding:30px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
        h1 { color:#4f46e5; text-align:center; }
        button { padding:14px 28px; margin:10px 5px; border:none; border-radius:10px; font-size:16px; cursor:pointer; }
        #connect-btn { background:#4f46e5; color:white; font-weight:bold; }
        .locked { display:none; background:#f0f9ff; padding:20px; margin:15px 0; border-radius:12px; }
        textarea { width:100%; height:160px; padding:15px; border:2px solid #cbd5e1; border-radius:10px; font-size:16px; }
        #result { margin-top:15px; padding:15px; background:#ecfdf5; border-radius:10px; white-space:pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartContent ⚡ Pi Network</h1>
    <p style="text-align:center;">منصتك الذكية لإنشاء المحتوى على شبكة Pi</p>

    <div id="welcome" style="text-align:center; font-size:24px; margin:25px 0;">
        Welcome back, Creator 🚀
    </div>

    <button id="connect-btn" onclick="connectWithPi()" style="display:block; margin:20px auto;">
        🔗 Connect with Pi Wallet
    </button>

    <div id="features" class="locked">
        <h2>المميزات بعد الاتصال</h2>
        <button onclick="makePiPayment(0.5, 'حفظ Draft')">حفظ Draft (0.5 Pi)</button>
        <button onclick="makePiPayment(1, 'AI Generation')">توليد محتوى بالذكاء الاصطناعي (1 Pi)</button>
    </div>

    <div id="ai-section" class="locked">
        <h3>AI Tools</h3>
        <textarea id="prompt" placeholder="اكتب وصف المحتوى اللي عايز تولده..."></textarea>
        <button onclick="generateAI()" style="background:#10b981; color:white;">🚀 Generate with AI</button>
        <div id="result"></div>
    </div>
</div>

<script>
let currentUser = null;

async function initPi() {
    try {
        await window.Pi.init({ version: "2.0", sandbox: true });
        console.log("✅ Pi SDK Ready");
    } catch (e) { console.error(e); }
}

async function connectWithPi() {
    try {
        const auth = await window.Pi.authenticate(["payments", "username"], onIncompletePaymentFound);
        currentUser = auth.user;

        document.getElementById("welcome").innerHTML = `مرحباً، ${currentUser.username || 'Creator'} 👋`;
        document.getElementById("features").style.display = "block";
        document.getElementById("ai-section").style.display = "block";
        document.getElementById("connect-btn").style.display = "none";

        alert("✅ تم الاتصال بنجاح مع محفظة Pi!");
    } catch (error) {
        alert("❌ فشل الاتصال - تأكد أنك داخل Pi Browser");
    }
}

function onIncompletePaymentFound(payment) {
    return window.Pi.createPayment(payment);
}

async function makePiPayment(amount, memo) {
    if (!currentUser) return alert("اتصل بـ Pi أولاً");
    try {
        const payment = await window.Pi.createPayment({ amount, memo, metadata: { app: "SmartContent" } });
        alert(`✅ تم الدفع ${amount} Pi بنجاح!`);
        return payment;
    } catch (e) {
        alert("فشل الدفع");
    }
}

async function generateAI() {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) return alert("اكتب الوصف أولاً");

    const result = document.getElementById("result");
    result.innerHTML = "⏳ جاري الدفع ثم التوليد...";

    const payment = await makePiPayment(0.5, "AI Generation");

    if (!payment) return;

    result.innerHTML = "⏳ جاري التوليد بـ Gemini...";

    try {
        const res = await fetch("/api/generate-ai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, lang: "ar" })
        });
        const data = await res.json();
        result.innerHTML = data.text || data.content || "تم التوليد لكن بدون نص.";
    } catch (err) {
        result.innerHTML = "❌ خطأ في الاتصال بالـ AI. تحقق من GEMINI_API_KEY في Vercel.";
    }
}

window.onload = initPi;
</script>
</body>
</html>
